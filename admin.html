<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Canteen - Admin Panel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #ff6b6b;
            --secondary-color: #4ecdc4;
            --dark-color: #2c3e50;
            --light-color: #ecf0f1;
            --success-color: #27ae60;
            --warning-color: #f39c12;
            --danger-color: #e74c3c;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            --transition: all 0.3s ease;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: var(--dark-color);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        /* Header */
        header {
            background: white;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: var(--shadow);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        header h1 {
            color: var(--primary-color);
            font-size: 28px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        header h1::before {
            content: "👨‍💼";
            font-size: 32px;
        }

        .header-actions {
            display: flex;
            gap: 15px;
        }

        .btn-secondary {
            background: var(--secondary-color);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
        }

        .btn-secondary:hover {
            background: #3db8aa;
            transform: translateY(-2px);
        }

        .logout-btn {
            background: var(--danger-color);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
        }

        .logout-btn:hover {
            background: #c0392b;
        }

        /* Main Content */
        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        /* Card */
        .card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: var(--shadow);
        }

        .card h2 {
            color: var(--dark-color);
            margin-bottom: 25px;
            font-size: 22px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Form Group */
        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: var(--dark-color);
            font-size: 14px;
        }

        select, input[type="text"], input[type="number"], textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid var(--light-color);
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: var(--transition);
        }

        select:focus, input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 10px rgba(255, 107, 107, 0.2);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        /* Status Options */
        .status-options {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
        }

        .status-option {
            position: relative;
        }

        .status-option input[type="radio"] {
            display: none;
        }

        .status-option label {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
            border: 2px solid var(--light-color);
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            text-align: center;
            transition: var(--transition);
            margin: 0;
        }

        .status-option.green label {
            color: var(--success-color);
        }

        .status-option.yellow label {
            color: var(--warning-color);
        }

        .status-option.red label {
            color: var(--danger-color);
        }

        .status-option input[type="radio"]:checked + label {
            background: var(--light-color);
            border-color: var(--primary-color);
            transform: scale(1.05);
        }

        /* Buttons */
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn-primary {
            flex: 1;
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: var(--transition);
        }

        .btn-primary:hover:not(:disabled) {
            background: #ff5252;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(255, 107, 107, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-primary:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn-reset {
            flex: 1;
            background: var(--light-color);
            color: var(--dark-color);
            border: 2px solid var(--light-color);
            padding: 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: var(--transition);
        }

        .btn-reset:hover {
            border-color: var(--dark-color);
        }

        /* Status Display */
        .status-display {
            background: var(--light-color);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .status-display h3 {
            color: var(--dark-color);
            margin-bottom: 15px;
            font-size: 14px;
            font-weight: 600;
        }

        .current-status {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            background: white;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .status-light {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            animation: pulse 2s infinite;
            box-shadow: 0 0 10px currentColor;
        }

        .status-light.green {
            background: var(--success-color);
            color: var(--success-color);
        }

        .status-light.yellow {
            background: var(--warning-color);
            color: var(--warning-color);
        }

        .status-light.red {
            background: var(--danger-color);
            color: var(--danger-color);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .status-info {
            flex: 1;
        }

        .status-info p {
            font-size: 13px;
            margin: 3px 0;
        }

        .status-info strong {
            color: var(--primary-color);
        }

        /* Activity Log */
        .activity-log {
            max-height: 300px;
            overflow-y: auto;
            border: 2px solid var(--light-color);
            border-radius: 8px;
            padding: 15px;
        }

        .log-entry {
            padding: 10px;
            border-bottom: 1px solid var(--light-color);
            font-size: 13px;
            color: #7f8c8d;
        }

        .log-entry:last-child {
            border-bottom: none;
        }

        .log-time {
            color: var(--primary-color);
            font-weight: 600;
        }

        /* Alert/Notification */
        .alert {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .alert.show {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        /* Loading */
        .loading {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid rgba(0, 0, 0, 0.1);
            border-top-color: var(--primary-color);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            header {
                flex-direction: column;
            }

            .status-options {
                grid-template-columns: 1fr;
            }

            .btn-group {
                flex-direction: column;
            }
        }

        .link-btn {
            background: var(--secondary-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            font-weight: 600;
            display: inline-block;
            transition: var(--transition);
        }

        .link-btn:hover {
            background: #3db8aa;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <h1>Canteen Admin Panel</h1>
            <div class="header-actions">
                <a href="index.html" class="link-btn">← Back to Menu</a>
                <button class="logout-btn" id="logoutBtn">Logout</button>
            </div>
        </header>

        <!-- Alert Messages -->
        <div class="alert alert-success" id="successAlert">
            <span id="successMessage"></span>
        </div>
        <div class="alert alert-error" id="errorAlert">
            <span id="errorMessage"></span>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Update Status Card -->
            <div class="card">
                <h2>🚦 Update Waiting Status</h2>
                
                <form id="statusForm">
                    <!-- Status Selection -->
                    <div class="form-group">
                        <label>Select Status:</label>
                        <div class="status-options">
                            <div class="status-option green">
                                <input type="radio" id="statusGreen" name="status" value="no_waiting" required>
                                <label for="statusGreen">🟢 No Waiting</label>
                            </div>
                            <div class="status-option yellow">
                                <input type="radio" id="statusYellow" name="status" value="little_waiting">
                                <label for="statusYellow">🟡 Little Waiting</label>
                            </div>
                            <div class="status-option red">
                                <input type="radio" id="statusRed" name="status" value="high_waiting">
                                <label for="statusRed">🔴 High Waiting</label>
                            </div>
                        </div>
                    </div>

                    <!-- Waiting Time -->
                    <div class="form-group">
                        <label for="waitingTime">Waiting Time (minutes):</label>
                        <input 
                            type="number" 
                            id="waitingTime" 
                            min="0" 
                            max="120" 
                            value="0"
                            placeholder="e.g., 0, 15, 45"
                        >
                    </div>

                    <!-- Description -->
                    <div class="form-group">
                        <label for="description">Description/Message:</label>
                        <textarea 
                            id="description" 
                            placeholder="e.g., Ready Now! | 15-20 minutes wait | 45+ minutes, please order later"
                        ></textarea>
                    </div>

                    <!-- Buttons -->
                    <div class="btn-group">
                        <button type="submit" class="btn-primary" id="submitBtn">
                            Send Update
                        </button>
                        <button type="reset" class="btn-reset">Clear</button>
                    </div>
                </form>
            </div>

            <!-- Status Monitor Card -->
            <div class="card">
                <h2>📊 Current Status</h2>
                
                <div class="status-display">
                    <h3>Live Status:</h3>
                    <div class="current-status">
                        <div class="status-light" id="monitorLight"></div>
                        <div class="status-info">
                            <p><strong id="monitorStatus">Loading...</strong></p>
                            <p id="monitorDescription">Fetching current status...</p>
                            <p style="font-size: 11px; margin-top: 5px;" id="monitorTime">Last updated: --</p>
                        </div>
                    </div>
                </div>

                <!-- Recent Activity -->
                <h3 style="margin-top: 20px; margin-bottom: 10px; font-size: 14px; font-weight: 600; color: var(--dark-color);">📝 Recent Updates:</h3>
                <div class="activity-log" id="activityLog">
                    <div style="text-align: center; color: #95a5a6; padding: 20px;">
                        No updates yet
                    </div>
                </div>

                <!-- Auto Refresh -->
                <div class="form-group" style="margin-top: 20px;">
                    <label style="display: flex; align-items: center; gap: 10px; margin-bottom: 0;">
                        <input type="checkbox" id="autoRefresh" checked>
                        Auto-refresh status (every 10 seconds)
                    </label>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Configuration
        const API_URL = 'https://sheetdb.io/api/v1/w7ish5j4zkzcd';
        let activityLog = [];
        let currentStatus = null;

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            setupEventListeners();
            fetchCurrentStatus();
            
            // Auto-fetch status
            setInterval(() => {
                if (document.getElementById('autoRefresh').checked) {
                    fetchCurrentStatus();
                }
            }, 10000);
        });

        // Setup Event Listeners
        function setupEventListeners() {
            document.getElementById('statusForm').addEventListener('submit', handleFormSubmit);
            
            // Set default status option
            document.getElementById('statusGreen').checked = true;
            
            // Update description based on status selection
            const statusRadios = document.querySelectorAll('input[name="status"]');
            statusRadios.forEach(radio => {
                radio.addEventListener('change', (e) => {
                    const suggestions = {
                        'no_waiting': 'Ready Now! Order your food immediately',
                        'little_waiting': '15-20 minutes wait. You can order now',
                        'high_waiting': '45+ minutes wait. Please order later or come back soon'
                    };
                    document.getElementById('description').placeholder = suggestions[e.target.value];
                });
            });

            document.getElementById('logoutBtn').addEventListener('click', () => {
                alert('Logout functionality - Redirect to login page');
                // window.location.href = 'login.html';
            });
        }

        // Handle Form Submit
        async function handleFormSubmit(e) {
            e.preventDefault();

            const status = document.querySelector('input[name="status"]:checked').value;
            const waitingTime = document.getElementById('waitingTime').value;
            const description = document.getElementById('description').value;

            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="loading"></span> Sending...';

            try {
                // Prepare data for SheetDB
                const data = {
                    id: "1",
                    status: status,
                    waiting_time: waitingTime || "0",
                    description: description || getDefaultDescription(status, waitingTime),
                    last_updated: new Date().toLocaleString()
                };

                console.log('Sending data:', data);

                // First try to update via PUT request
                let response = await fetch(`${API_URL}/id/1`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                console.log('PUT Response status:', response.status);

                // If not found (404), try to create new entry with POST
                if (response.status === 404) {
                    console.log('Row not found, creating new entry with POST...');
                    
                    response = await fetch(API_URL, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(data)
                    });

                    console.log('POST Response status:', response.status);
                }

                const responseText = await response.text();
                console.log('Response:', responseText);

                if (response.ok) {
                    showAlert('success', '✅ Status updated successfully!');
                    addActivityLog(`Status changed to ${status} - ${waitingTime} min wait`);
                    
                    // Reset form
                    document.getElementById('statusForm').reset();
                    document.getElementById('statusGreen').checked = true;
                    
                    // Refresh status display
                    setTimeout(fetchCurrentStatus, 500);
                } else {
                    throw new Error(`Server error: ${response.status} - ${responseText}`);
                }
            } catch (error) {
                console.error('Error:', error);
                showAlert('error', '❌ Error: ' + error.message);
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Send Update';
            }
        }

        // Get Default Description
        function getDefaultDescription(status, waitingTime) {
            switch(status) {
                case 'no_waiting':
                    return 'Ready Now! Order your food immediately';
                case 'little_waiting':
                    return `${waitingTime || '15-20'} minutes wait. You can order now`;
                case 'high_waiting':
                    return `${waitingTime || '45'}+ minutes wait. Please order later`;
                default:
                    return '';
            }
        }

        // Fetch Current Status
        async function fetchCurrentStatus() {
            try {
                const response = await fetch(API_URL);
                
                if (!response.ok) {
                    throw new Error(`API error: ${response.status}`);
                }
                
                const data = await response.json();
                console.log('Fetched data:', data); // Debug log

                if (!data || data.length === 0) {
                    updateStatusDisplay({
                        status: 'error',
                        description: 'No data available',
                        waiting_time: '--',
                        last_updated: 'N/A'
                    });
                    return;
                }

                const statusData = data[0];
                currentStatus = statusData;
                updateStatusDisplay(statusData);
            } catch (error) {
                console.error('Error fetching status:', error);
                updateStatusDisplay({
                    status: 'error',
                    description: 'Connection error: ' + error.message,
                    waiting_time: '--',
                    last_updated: 'Error'
                });
            }
        }

        // Update Status Display
        function updateStatusDisplay(statusData) {
            const light = document.getElementById('monitorLight');
            const statusText = document.getElementById('monitorStatus');
            const description = document.getElementById('monitorDescription');
            const timeText = document.getElementById('monitorTime');

            const status = (statusData.status || 'unknown').toLowerCase();
            let colorClass = 'red';

            if (status.includes('no_waiting')) {
                colorClass = 'green';
                statusText.textContent = '🟢 No Waiting';
            } else if (status.includes('little_waiting')) {
                colorClass = 'yellow';
                statusText.textContent = '🟡 Little Waiting';
            } else if (status.includes('high_waiting')) {
                colorClass = 'red';
                statusText.textContent = '🔴 High Waiting';
            } else {
                colorClass = 'red';
                statusText.textContent = '⚠️ Unknown';
            }

            light.className = `status-light ${colorClass}`;
            description.textContent = statusData.description || 'No description';
            timeText.textContent = `Last updated: ${statusData.last_updated || 'Unknown'}`;
        }

        // Add Activity Log
        function addActivityLog(message) {
            const timestamp = new Date().toLocaleTimeString();
            activityLog.unshift({ time: timestamp, message: message });
            
            // Keep only last 10 entries
            if (activityLog.length > 10) {
                activityLog.pop();
            }

            renderActivityLog();
        }

        // Render Activity Log
        function renderActivityLog() {
            const logDiv = document.getElementById('activityLog');
            
            if (activityLog.length === 0) {
                logDiv.innerHTML = `
                    <div style="text-align: center; color: #95a5a6; padding: 20px;">
                        No updates yet
                    </div>
                `;
                return;
            }

            logDiv.innerHTML = activityLog.map(entry => `
                <div class="log-entry">
                    <span class="log-time">${entry.time}</span> - ${entry.message}
                </div>
            `).join('');
        }

        // Show Alert
        function showAlert(type, message) {
            const alertId = `${type}Alert`;
            const messageId = `${type}Message`;
            
            const alertDiv = document.getElementById(alertId);
            const messageDiv = document.getElementById(messageId);
            
            messageDiv.textContent = message;
            alertDiv.classList.add('show');

            setTimeout(() => {
                alertDiv.classList.remove('show');
            }, 4000);
        }

        // Logout
        document.getElementById('logoutBtn').addEventListener('click', () => {
            if (confirm('Are you sure you want to logout?')) {
                // Implement logout logic here
                showAlert('success', 'Logged out successfully!');
                // window.location.href = 'login.html';
            }
        });
    </script>
</body>
</html>
